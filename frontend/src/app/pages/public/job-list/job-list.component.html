<div class="bg-gray-50 min-h-screen py-12">
    <div class="container mx-auto px-4">
        <div class="text-center mb-12">
            <h2 class="text-3xl font-extrabold text-gray-900 sm:text-4xl">
                Nos offres d'emploi
            </h2>
            <p class="mt-4 text-xl text-gray-500">
                Trouvez le poste qui correspond à vos ambitions.
            </p>
        </div>

        <!-- Filters placeholder -->
        <div class="mb-8 flex justify-center">
            <input type="text" placeholder="Rechercher par mot-clé..."
                class="w-full max-w-lg px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary focus:border-primary shadow-sm">
        </div>

        <div class="grid gap-8 md:grid-cols-2 lg:grid-cols-3">
            <div *ngFor="let offer of jobOffers"
                class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition duration-300 transform hover:-translate-y-1 flex flex-col">
                <div class="p-6 flex-grow">
                    <div class="flex items-center justify-between mb-4">
                        <span
                            class="inline-flex items-center px-3 py-0.5 rounded-full text-sm font-medium bg-indigo-100 text-indigo-800">
                            {{ offer.status }}
                        </span>
                        <span class="text-sm text-gray-500">{{ offer.postedDate | date:'mediumDate' }}</span>
                    </div>
                    <h3 class="text-xl font-bold text-gray-900 mb-2">{{ offer.title }}</h3>
                    <p class="text-sm text-gray-600 mb-4 flex items-center">
                        <span class="material-icons text-base mr-1">location_on</span>
                        {{ offer.location }}
                    </p>
                    <p class="text-gray-600 line-clamp-3 mb-4">
                        {{ offer.description }}
                    </p>
                    <div class="flex flex-wrap gap-2 mb-4">
                        <span *ngFor="let tag of offer.tags"
                            class="px-2 py-1 bg-gray-100 text-gray-600 text-xs rounded-md">
                            {{ tag }}
                        </span>
                    </div>
                </div>
                <div class="bg-gray-50 px-6 py-4 border-t border-gray-100">
                    <a [routerLink]="['/jobs', offer.id]"
                        class="w-full block text-center bg-white border border-gray-300 text-gray-700 font-bold py-2 px-4 rounded hover:bg-primary hover:text-white hover:border-transparent transition duration-300">
                        Voir Détails
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
