<div class="p-8 bg-gray-50 min-h-screen">
    <div class="max-w-7xl mx-auto bg-white rounded-xl shadow-md overflow-hidden">

        <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
            <h2 class="text-xl font-bold text-gray-800">Gestion des Offres</h2>
            <button
                class="bg-primary hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded transition flex items-center">
                <span class="material-icons mr-1">add</span>
                Nouvelle Offre
            </button>
        </div>

        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Titre
                        </th>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Lieu
                        </th>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date
                            de publication</th>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                            Statut</th>
                        <th scope="col"
                            class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                            Actions</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <tr *ngFor="let offer of offers" class="hover:bg-gray-50 transition">
                        <td class="px-6 py-4 white-space-nowrap">
                            <div class="text-sm font-medium text-gray-900">{{ offer.title }}</div>
                            <div class="text-sm text-gray-500">{{ offer.tags?.join(', ') }}</div>
                        </td>
                        <td class="px-6 py-4 white-space-nowrap text-sm text-gray-500">
                            {{ offer.location }}
                        </td>
                        <td class="px-6 py-4 white-space-nowrap text-sm text-gray-500">
                            {{ offer.postedDate | date:'shortDate' }}
                        </td>
                        <td class="px-6 py-4 white-space-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full" [ngClass]="{
                      'bg-green-100 text-green-800': offer.status === 'OPEN',
                      'bg-red-100 text-red-800': offer.status === 'CLOSED',
                      'bg-gray-100 text-gray-800': offer.status === 'DRAFT'
                    }">
                                {{ offer.status }}
                            </span>
                        </td>
                        <td class="px-6 py-4 white-space-nowrap text-right text-sm font-medium">
                            <button class="text-indigo-600 hover:text-indigo-900 mr-4">
                                <span class="material-icons text-base">edit</span>
                            </button>
                            <button (click)="deleteOffer(offer.id)" class="text-red-600 hover:text-red-900">
                                <span class="material-icons text-base">delete</span>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>
